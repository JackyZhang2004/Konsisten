<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<title>Konsisten</title>
<meta name="description" content="Pelacak kebiasaan, jadwal, dan resolusi harian." />
<meta name="theme-color" content="#14121F" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Konsisten" />

<style>
  :root{
    --ink:#14121F; --ink-2:#1A1726; --surface:#221E33; --surface-2:#2B2640;
    --line:#352F4D; --text:#F4EFE6; --dim:#A79FC2; --faint:#6E668C;
    --amber:#FF9F45; --amber-soft:#C77A2E; --mint:#58D0A6; --mint-deep:#2E7D63;
    --rose:#E8718A;
    --r:18px; --pad:18px;
    --ds:"Fraunces", Georgia, serif;
    --ui:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--ui); color:var(--text);
    background:
      radial-gradient(120% 60% at 50% -10%, #2A2342 0%, rgba(42,35,66,0) 55%),
      linear-gradient(180deg,#14121F 0%, #100E18 100%);
    background-attachment:fixed; min-height:100vh;
  }
  #app{max-width:448px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:100px}
  .pad{padding:0 var(--pad)}

  header{padding:26px var(--pad) 10px}
  .eyebrow{font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:600}
  .hello{font-family:var(--ds); font-weight:600; font-size:27px; line-height:1.12; margin:4px 0 2px}
  .hello .accent{color:var(--amber)}
  .subdate{color:var(--dim); font-size:14px}

  .summary{margin:16px var(--pad) 4px; padding:20px; border-radius:24px;
    background:linear-gradient(155deg, #2A2440 0%, #201C30 100%);
    border:1px solid var(--line); display:flex; gap:18px; align-items:center; position:relative; overflow:hidden}
  .summary::after{content:""; position:absolute; right:-40px; top:-40px; width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,159,69,.18), transparent 70%); pointer-events:none}
  .ringwrap{position:relative; width:96px; height:96px; flex:0 0 auto}
  .ringwrap .pct{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .ringwrap .pct b{font-family:var(--ds); font-size:25px; font-weight:600; line-height:1}
  .ringwrap .pct span{font-size:10.5px; color:var(--dim); margin-top:2px; letter-spacing:.04em}
  .summary .info h3{margin:0 0 4px; font-family:var(--ds); font-weight:600; font-size:19px}
  .summary .info p{margin:0; color:var(--dim); font-size:13.5px; line-height:1.45}

  .sec-h{display:flex; align-items:baseline; justify-content:space-between; margin:24px var(--pad) 12px}
  .sec-h h2{font-family:var(--ds); font-weight:600; font-size:18px; margin:0}
  .sec-h .meta{font-size:12.5px; color:var(--faint)}

  .card{margin:0 var(--pad) 11px; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--r); padding:14px 14px 14px 16px; display:flex; align-items:center; gap:13px;
    transition:transform .12s ease, border-color .2s ease, background .2s ease}
  .card.done{background:linear-gradient(135deg, rgba(88,208,166,.12), rgba(88,208,166,.04)); border-color:rgba(88,208,166,.32)}
  .card.skipped{opacity:.72; border-style:dashed}
  .card:active{transform:scale(.985)}
  .icon{width:44px; height:44px; border-radius:13px; display:grid; place-items:center; font-size:21px; background:var(--surface-2); flex:0 0 auto}
  .card.done .icon{background:rgba(88,208,166,.16)}
  .c-body{flex:1; min-width:0}
  .c-body .name{font-weight:600; font-size:15.5px; line-height:1.2}
  .c-body .sub{font-size:12.5px; color:var(--dim); margin-top:3px; display:flex; align-items:center; gap:7px; flex-wrap:wrap}
  .flame{display:inline-flex; align-items:center; gap:4px; color:var(--amber); font-weight:600}
  .flame svg{width:13px; height:13px}
  .pill{font-size:11px; color:var(--faint); background:var(--ink-2); padding:2px 8px; border-radius:99px}
  .pill.mint{color:var(--mint); background:rgba(88,208,166,.12)}
  .actions{display:flex; align-items:center; gap:8px; flex:0 0 auto}
  .check{width:34px; height:34px; border-radius:50%; border:2px solid var(--line); background:transparent;
    display:grid; place-items:center; cursor:pointer; transition:all .18s ease}
  .check svg{width:18px; height:18px; opacity:0; transform:scale(.4); transition:all .18s ease; stroke:#0E1714}
  .card.done .check{background:var(--mint); border-color:var(--mint)}
  .card.done .check svg{opacity:1; transform:scale(1)}
  .skip{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:transparent;
    color:var(--faint); display:grid; place-items:center; cursor:pointer; transition:all .18s}
  .skip svg{width:16px; height:16px}
  .skip:active{color:var(--rose); border-color:var(--rose)}
  .skipinfo{text-align:right; flex:0 0 auto}
  .skipinfo small{display:block; font-size:11px; color:var(--dim)}
  .skipinfo .undo{font-size:12px; color:var(--amber); font-weight:600; cursor:pointer; margin-top:2px; display:inline-block}

  .row{margin:0 var(--pad) 10px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    padding:13px 14px; display:flex; align-items:center; gap:13px; cursor:pointer; transition:transform .12s ease}
  .row:active{transform:scale(.985)}
  .chev{color:var(--faint); flex:0 0 auto}

  .empty{margin:8px var(--pad) 0; text-align:center; padding:34px 22px; border:1px dashed var(--line);
    border-radius:22px; background:rgba(255,255,255,.012)}
  .empty .em{font-size:30px}
  .empty h3{font-family:var(--ds); font-weight:600; font-size:18px; margin:12px 0 6px}
  .empty p{color:var(--dim); font-size:14px; margin:0 auto; max-width:280px; line-height:1.5}

  .btn{font-family:var(--ui); font-weight:600; font-size:15px; border:none; border-radius:14px; padding:13px 18px;
    cursor:pointer; transition:transform .12s ease, filter .2s ease; width:100%}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg, var(--amber), #FF8736); color:#241204}
  .btn-ghost{background:var(--surface-2); color:var(--text); border:1px solid var(--line)}
  .btn-danger{background:transparent; color:var(--rose); border:1px solid rgba(232,113,138,.4)}
  .addbar{margin:6px var(--pad) 0; display:flex; gap:10px}

  .stats{display:grid; grid-template-columns:1fr 1fr; gap:11px; margin:0 var(--pad) 4px}
  .stat{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:15px 15px 14px}
  .stat .big{font-family:var(--ds); font-weight:600; font-size:30px; line-height:1}
  .stat .big.amber{color:var(--amber)} .stat .big.mint{color:var(--mint)}
  .stat .lbl{color:var(--dim); font-size:12.5px; margin-top:6px}

  .gridcard{margin:14px var(--pad) 4px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:16px 16px 14px}
  .gridcard h4{margin:0 0 3px; font-family:var(--ds); font-weight:600; font-size:16px}
  .gridcard .desc{color:var(--dim); font-size:12.5px; margin:0 0 14px}
  .heat{display:flex; gap:4px; overflow-x:auto; padding-bottom:4px}
  .week{display:flex; flex-direction:column; gap:4px}
  .cell{width:13px; height:13px; border-radius:4px; background:#241F36}
  .cell.skip{background:repeating-linear-gradient(45deg,#2A2440,#2A2440 2px,#332B49 2px,#332B49 4px)}
  .legend{display:flex; align-items:center; gap:6px; justify-content:flex-end; margin-top:10px; color:var(--faint); font-size:11px}
  .legend .cell{width:11px; height:11px}

  .pbar{height:7px; border-radius:99px; background:var(--ink-2); overflow:hidden; margin-top:10px}
  .pbar > i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--amber),var(--mint)); transition:width .5s ease}

  .res{margin:0 var(--pad) 12px; background:linear-gradient(160deg,#262038,#201B2F); border:1px solid var(--line); border-radius:20px; padding:17px}
  .res .rt{font-family:var(--ds); font-weight:600; font-size:18px; line-height:1.2}
  .res .rmeta{color:var(--dim); font-size:13px; margin-top:4px}
  .chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:11px}
  .chip{font-size:12px; background:var(--ink-2); border:1px solid var(--line); padding:5px 10px; border-radius:99px; color:var(--dim)}
  .res .num{display:flex; align-items:baseline; gap:7px; margin-top:14px}
  .res .num b{font-family:var(--ds); font-size:26px; font-weight:600; color:var(--amber)}
  .res .num span{color:var(--dim); font-size:13px}

  /* calendar */
  .cal{margin:14px var(--pad) 4px}
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  .cal-head .mname{font-family:var(--ds); font-weight:600; font-size:19px}
  .cal-nav{display:flex; gap:8px}
  .cal-nav button{width:36px; height:36px; border-radius:11px; background:var(--surface); border:1px solid var(--line); color:var(--text); cursor:pointer; display:grid; place-items:center}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px}
  .cal-dow{text-align:center; font-size:11px; color:var(--faint); font-weight:600; padding-bottom:2px}
  .cal-cell{aspect-ratio:1; border-radius:12px; background:var(--surface); border:1px solid transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:3px; transition:transform .1s}
  .cal-cell:active{transform:scale(.93)}
  .cal-cell.blank{background:transparent; cursor:default}
  .cal-cell .dn{font-size:13.5px; font-weight:600}
  .cal-cell.today{border-color:var(--amber)} .cal-cell.today .dn{color:var(--amber)}
  .cal-cell.alldone{background:rgba(88,208,166,.16); border-color:rgba(88,208,166,.32)}
  .cal-cell.outpast{opacity:.5}
  .dots{display:flex; gap:3px; height:5px}
  .dot{width:5px; height:5px; border-radius:50%}
  .dot.h{background:var(--amber)} .dot.t{background:var(--mint)}

  /* tasks */
  .task{margin:0 var(--pad) 9px; background:var(--surface); border:1px solid var(--line); border-radius:15px;
    padding:12px 14px; display:flex; align-items:center; gap:12px; transition:transform .1s}
  .task:active{transform:scale(.99)}
  .task.done{opacity:.6}
  .task .tcheck{width:26px; height:26px; border-radius:8px; border:2px solid var(--line); flex:0 0 auto; display:grid; place-items:center; cursor:pointer; transition:all .15s}
  .task .tcheck svg{width:15px; height:15px; stroke:#0E1714; opacity:0}
  .task.done .tcheck{background:var(--mint); border-color:var(--mint)} .task.done .tcheck svg{opacity:1}
  .task .ttitle{flex:1; font-size:14.5px; font-weight:500}
  .task.done .ttitle{text-decoration:line-through; color:var(--faint)}
  .task .ttime{font-size:12.5px; color:var(--amber); font-weight:600; font-variant-numeric:tabular-nums; flex:0 0 auto}
  .task .tdel{color:var(--faint); cursor:pointer; flex:0 0 auto; display:grid; place-items:center; width:24px; height:24px}

  nav{position:fixed; left:0; right:0; bottom:0; z-index:40}
  .nav-inner{max-width:448px; margin:0 auto; display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    background:rgba(20,18,31,.86); backdrop-filter:blur(16px); border-top:1px solid var(--line)}
  .tab{flex:1; background:none; border:none; color:var(--faint); display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 2px; cursor:pointer; font-family:var(--ui); font-size:9.5px; font-weight:600; white-space:nowrap; transition:color .2s}
  .tab svg{width:21px; height:21px; stroke-width:1.9; fill:none; stroke:currentColor}
  .tab.active{color:var(--amber)}

  .scrim{position:fixed; inset:0; background:rgba(8,7,12,.62); opacity:0; pointer-events:none; transition:opacity .25s; z-index:50}
  .scrim.open{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:60; max-width:448px; margin:0 auto; max-height:88vh; overflow-y:auto;
    background:var(--ink-2); border:1px solid var(--line); border-bottom:none; border-radius:26px 26px 0 0;
    padding:8px var(--pad) calc(22px + env(safe-area-inset-bottom)); transform:translateY(110%); transition:transform .3s cubic-bezier(.22,1,.36,1)}
  .sheet.open{transform:translateY(0)}
  .grab{width:38px; height:4px; border-radius:99px; background:var(--line); margin:8px auto 16px}
  .sheet h3{font-family:var(--ds); font-weight:600; font-size:20px; margin:0 0 4px}
  .sheet .shsub{color:var(--dim); font-size:13px; margin:0 0 14px}
  label.fl{display:block; font-size:12.5px; color:var(--dim); font-weight:600; margin:14px 2px 7px}
  input.tf{width:100%; background:var(--surface); border:1px solid var(--line); color:var(--text); font-family:var(--ui); font-size:15px; padding:13px 14px; border-radius:13px; outline:none}
  input.tf:focus{border-color:var(--amber)}
  input[type=time].tf{font-family:var(--ui)}
  .emojis{display:flex; gap:8px; flex-wrap:wrap}
  .emoji-opt{width:42px; height:42px; border-radius:12px; background:var(--surface); border:1px solid var(--line); font-size:20px; cursor:pointer; display:grid; place-items:center; transition:all .15s}
  .emoji-opt.sel{border-color:var(--amber); background:rgba(255,159,69,.14)}
  .segs{display:flex; gap:7px}
  .seg{flex:1; text-align:center; background:var(--surface); border:1px solid var(--line); color:var(--dim); padding:11px 4px; border-radius:12px; font-size:12.5px; font-weight:600; cursor:pointer; transition:all .15s}
  .seg.sel{border-color:var(--amber); color:var(--text); background:rgba(255,159,69,.1)}
  .dows{display:flex; gap:6px; margin-top:10px}
  .dow{flex:1; aspect-ratio:1; max-width:44px; border-radius:11px; background:var(--surface); border:1px solid var(--line); color:var(--dim); font-size:13px; font-weight:600; cursor:pointer; display:grid; place-items:center; transition:all .15s}
  .dow.sel{background:var(--amber); color:#241204; border-color:var(--amber)}
  .stepper{display:flex; align-items:center; gap:14px; margin-top:10px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:10px 16px; justify-content:space-between}
  .stepper button{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--ink-2); color:var(--text); font-size:22px; cursor:pointer; line-height:1}
  .stepval{text-align:center} .stepval b{font-family:var(--ds); font-size:24px; display:block} .stepval span{font-size:11.5px; color:var(--faint)}
  .sheet-actions{display:flex; gap:10px; margin-top:22px}
  .sheet-actions .btn{flex:1}
  .targets{display:flex; gap:8px}
  .target{flex:1; text-align:center; padding:13px 6px; border-radius:13px; background:var(--surface); border:1px solid var(--line); cursor:pointer; transition:all .15s}
  .target.sel{border-color:var(--amber); background:rgba(255,159,69,.1)}
  .target b{font-family:var(--ds); font-size:18px; display:block} .target span{font-size:11px; color:var(--faint)}
  .selectlist{display:flex; flex-direction:column; gap:8px; max-height:200px; overflow:auto; margin-top:4px}
  .selrow{display:flex; align-items:center; gap:11px; padding:11px; border-radius:13px; background:var(--surface); border:1px solid var(--line); cursor:pointer}
  .selrow.sel{border-color:var(--mint); background:rgba(88,208,166,.08)}
  .selrow .box{width:22px; height:22px; border-radius:7px; border:2px solid var(--line); flex:0 0 auto; display:grid; place-items:center}
  .selrow.sel .box{background:var(--mint); border-color:var(--mint)}
  .selrow .box svg{width:13px; height:13px; stroke:#0E1714; opacity:0} .selrow.sel .box svg{opacity:1}
  .taskform{display:flex; gap:8px; margin-top:10px}
  .taskform input.title{flex:1} .taskform input.time{width:104px}
  .taskform .addt{width:50px; flex:0 0 auto; background:var(--amber); color:#241204; border:none; border-radius:13px; font-size:24px; cursor:pointer}
  .daysec{font-size:12.5px; color:var(--dim); font-weight:600; margin:18px 2px 9px}
  .dnone{color:var(--faint); font-size:13px; padding:6px 2px}

  .toast{position:fixed; left:50%; bottom:112px; transform:translateX(-50%) translateY(20px); z-index:80;
    background:linear-gradient(135deg,var(--amber),#FF8736); color:#241204; font-weight:700; font-size:14px;
    padding:12px 18px; border-radius:14px; opacity:0; transition:all .3s; pointer-events:none; box-shadow:0 8px 30px rgba(255,135,54,.4); max-width:90%}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .loading{display:grid; place-items:center; height:100vh; color:var(--dim); font-size:14px}

  /* view switcher */
  .vswitch{display:flex; gap:6px; margin:4px var(--pad) 0; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:5px}
  .vseg{flex:1; border:none; background:none; color:var(--dim); font-family:var(--ui); font-weight:600; font-size:13.5px; padding:9px; border-radius:10px; cursor:pointer; transition:all .15s}
  .vseg.sel{background:rgba(255,159,69,.14); color:var(--amber)}
  .calleg{margin:14px var(--pad) 0; display:flex; gap:16px; color:var(--faint); font-size:12px; align-items:center}
  .calleg span{display:flex; align-items:center; gap:6px}
  /* prep alert */
  .alert{margin:0 var(--pad) 10px; background:linear-gradient(135deg, rgba(255,159,69,.13), rgba(255,159,69,.04)); border:1px solid rgba(255,159,69,.32);
    border-left:4px solid var(--amber); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:13px; cursor:pointer}
  .alert-d{flex:0 0 auto; text-align:center; min-width:46px}
  .alert-d b{font-family:var(--ds); font-size:20px; color:var(--amber); display:block; line-height:1}
  .alert-d span{font-size:10.5px; color:var(--dim)}
  .bell{font-size:10.5px; color:var(--amber); background:rgba(255,159,69,.14); padding:1px 7px; border-radius:99px; font-weight:600}
  /* week view */
  .wk-day{margin:0 var(--pad) 9px; background:var(--surface); border:1px solid var(--line); border-radius:15px; padding:11px 13px}
  .wk-day.today{border-color:var(--amber)}
  .wk-head{display:flex; align-items:baseline; gap:8px; cursor:pointer; margin-bottom:8px}
  .wk-head b{font-family:var(--ds); font-weight:600; font-size:15px}
  .wk-head span{font-size:12px; color:var(--faint)}
  .wk-day.today .wk-head b{color:var(--amber)}
  .wk-ev{display:flex; gap:10px; padding:6px 0; cursor:pointer; align-items:baseline}
  .wk-ev.done{opacity:.5; text-decoration:line-through}
  .wk-t{font-size:12px; color:var(--amber); font-weight:600; font-variant-numeric:tabular-nums; min-width:52px; flex:0 0 auto}
  .wk-title{font-size:14px}
  .wk-habits{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px}
  .hchip{font-size:11.5px; background:var(--ink-2); border:1px solid var(--line); color:var(--dim); padding:3px 9px; border-radius:99px}
  .hchip.done{color:var(--mint); border-color:rgba(88,208,166,.3)}
  .wk-empty{color:var(--faint); font-size:13px}
  /* agenda */
  .ag-date{margin:18px var(--pad) 9px; font-family:var(--ds); font-weight:600; font-size:15px; display:flex; justify-content:space-between; align-items:baseline}
  .ag-date span{font-size:12px; color:var(--amber); font-family:var(--ui); font-weight:600}
  textarea.tf{width:100%; min-height:64px; resize:vertical; font-family:var(--ui); font-size:14.5px; line-height:1.5}
  /* multi-day events */
  .task.span{border-color:rgba(255,159,69,.3); background:linear-gradient(135deg, rgba(255,159,69,.08), rgba(88,208,166,.05)); padding-left:0}
  .task.span .sbar{width:4px; align-self:stretch; min-height:30px; border-radius:99px; background:linear-gradient(180deg,var(--amber),var(--mint)); margin-right:12px; flex:0 0 auto}
  .task.span .ttime{color:var(--mint)}
  .wk-span{display:flex; gap:9px; align-items:center; padding:6px 0; cursor:pointer}
  .wk-span .bar{width:4px; align-self:stretch; min-height:18px; border-radius:99px; background:linear-gradient(180deg,var(--amber),var(--mint)); flex:0 0 auto}
  .wk-span .s-main{flex:1; min-width:0}
  .wk-span .s-title{font-size:14px; display:block} .wk-span.done .s-title{opacity:.5; text-decoration:line-through}

/* storage — saved on this device (localStorage), with in-memory fallback */
const KEY='konsisten_v2';

/* dates */
const DOW=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
const DOWFULL=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MONTH=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseISO(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function todayISO(){ return iso(new Date()); }
function weekStart(d){ const x=parseISO(typeof d==='string'?d:iso(d)); const day=(x.getDay()+6)%7; return addDays(x,-day); }

/* state */
let state={ habits:[], completions:{}, skips:{}, tasks:[], resolutions:[] };
let tab='today';
let editingHabit=null, editingRes=null, draft={};
let calY, calM, daySheetDate=null;
let calMode='month', weekRefISO=null, editingEvent=null;

/* logic */
function dueScheduled(h,ds){ if(h.schedule.type==='daily') return true; if(h.schedule.type==='weekly') return h.schedule.days.includes(parseISO(ds).getDay()); return false; }
function isDone(id,ds){ return (state.completions[ds]||[]).includes(id); }
function isSkipped(id,ds){ return (state.skips[ds]||[]).includes(id); }
function setDone(id,ds,v){ const a=state.completions[ds]||(state.completions[ds]=[]); const i=a.indexOf(id); if(v&&i<0)a.push(id); if(!v&&i>=0)a.splice(i,1); }
function setSkip(id,ds,v){ const a=state.skips[ds]||(state.skips[ds]=[]); const i=a.indexOf(id); if(v&&i<0)a.push(id); if(!v&&i>=0)a.splice(i,1); }
function toggleDone(id,ds){ const v=!isDone(id,ds); setDone(id,ds,v); if(v) setSkip(id,ds,false); }
function toggleSkip(id,ds){ const v=!isSkipped(id,ds); setSkip(id,ds,v); if(v) setDone(id,ds,false); }
function weekCount(h,ds){ const ws=weekStart(ds); let c=0; for(let i=0;i<7;i++){ if(isDone(h.id, iso(addDays(ws,i)))) c++; } return c; }

function scheduleText(h){
  if(h.schedule.type==='daily') return 'Setiap hari';
  if(h.schedule.type==='flexible') return 'Min. '+h.schedule.timesPerWeek+'×/minggu';
  const d=h.schedule.days.slice().sort((a,b)=>a-b);
  if(d.length===7) return 'Setiap hari';
  if(d.length===5 && d.every(x=>x>=1&&x<=5)) return 'Hari kerja';
  return d.map(x=>DOW[x]).join(' · ');
}

function currentStreak(h){
  if(h.schedule.type==='flexible'){
    const tgt=h.schedule.timesPerWeek; const created=parseISO(h.createdAt);
    let s=0, ws=weekStart(new Date());
    for(let i=0;i<260;i++){
      if(addDays(ws,6)<created) break;
      const c=weekCount(h,iso(ws));
      if(c>=tgt) s++; else if(i!==0) break;
      ws=addDays(ws,-7);
    }
    return s;
  }
  let s=0,d=new Date(),created=parseISO(h.createdAt);
  for(let i=0;i<500;i++){
    if(d<created) break;
    const ds=iso(d);
    if(dueScheduled(h,ds)){
      if(isDone(h.id,ds)) s++;
      else if(isSkipped(h.id,ds)){}
      else if(i!==0) break;
    }
    d=addDays(d,-1);
  }
  return s;
}
function longestStreak(h){
  if(h.schedule.type==='flexible'){
    const tgt=h.schedule.timesPerWeek; let best=0,cur=0;
    let ws=weekStart(h.createdAt); const cur0=weekStart(new Date());
    while(ws<=cur0){ const c=weekCount(h,iso(ws)); const isCur=iso(ws)===iso(cur0);
      if(c>=tgt){cur++; if(cur>best)best=cur;} else if(!isCur) cur=0; ws=addDays(ws,7); }
    return best;
  }
  let best=0,cur=0,d=parseISO(h.createdAt),today=new Date(),ti=todayISO();
  while(d<=today){ const ds=iso(d);
    if(dueScheduled(h,ds)){ if(isDone(h.id,ds)){cur++; if(cur>best)best=cur;} else if(isSkipped(h.id,ds)){} else if(ds!==ti) cur=0; }
    d=addDays(d,1); }
  return best;
}
function rate(h){
  if(h.schedule.type==='flexible'){
    const tgt=h.schedule.timesPerWeek; let met=0,tot=0, ws=addDays(weekStart(new Date()),-7), created=parseISO(h.createdAt);
    for(let i=0;i<8;i++){ if(addDays(ws,6)<created) break; tot++; if(weekCount(h,iso(ws))>=tgt) met++; ws=addDays(ws,-7); }
    return tot? Math.round(met/tot*100): null;
  }
  let due=0,done=0,d=addDays(new Date(),-1),created=parseISO(h.createdAt);
  for(let i=0;i<30;i++){ if(d<created) break; const ds=iso(d);
    if(dueScheduled(h,ds) && !isSkipped(h.id,ds)){ due++; if(isDone(h.id,ds)) done++; } d=addDays(d,-1); }
  return due? Math.round(done/due*100): null;
}
function tasksOn(ds){ return state.tasks.filter(t=>t.date===ds).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')); }
function daysBetween(aISO,bISO){ return Math.round((parseISO(bISO)-parseISO(aISO))/86400000); }
function toMin(hhmm){ if(!hhmm) return null; const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function validEnd(t){ return (t.end && toMin(t.end)>toMin(t.time))? t.end : null; }
function evTimeLabel(t){ if(!t.time) return ''; const e=validEnd(t); return t.time + (e?'–'+e:''); }
function evType(t){ if(t.type) return t.type; if(t.repeat) return 'repeat'; if(t.dates) return 'multi'; if(t.endDate&&t.endDate>t.date) return 'span'; return 'once'; }
function isContinuous(t){ return evType(t)==='span'; }
function eventDates(t){ const ty=evType(t);
  if(ty==='multi') return (t.dates||[]).slice().sort();
  const out=[]; let d=parseISO(t.date), e=parseISO(t.endDate||t.date);
  while(d<=e){ const ds=iso(d); if(ty!=='repeat' || !t.days || !t.days.length || t.days.includes(d.getDay())) out.push(ds); d=addDays(d,1); }
  return out; }
function isRange(t){ const ty=evType(t); if(ty==='span'||ty==='repeat') return true; if(ty==='multi') return (t.dates&&t.dates.length>1); return false; }
function occursOn(t,ds){ const ty=evType(t);
  if(ty==='multi') return (t.dates||[]).includes(ds);
  const s=t.date, e=t.endDate||t.date; if(ds<s||ds>e) return false;
  if(ty==='repeat' && t.days && t.days.length) return t.days.includes(parseISO(ds).getDay()); return true; }
function occurrenceList(t){ return eventDates(t); }
function startDay(t){ const o=eventDates(t); return o[0]||t.date; }
function endDay(t){ const o=eventDates(t); return o[o.length-1]||t.endDate||t.date; }
function rangeLabel(t){ const ty=evType(t);
  if(ty==='multi') return (t.dates?t.dates.length:0)+' hari';
  const s=parseISO(t.date), e=parseISO(t.endDate||t.date);
  const sm=MONTH[s.getMonth()].slice(0,3), em=MONTH[e.getMonth()].slice(0,3);
  return s.getMonth()===e.getMonth()? `${s.getDate()}–${e.getDate()} ${em}` : `${s.getDate()} ${sm} – ${e.getDate()} ${em}`; }
function dayIndex(t,ds){ const o=eventDates(t); return {x:o.indexOf(ds)+1, n:o.length}; }
function dayTimeLabel(t,ds){
  if(!isContinuous(t)) return evTimeLabel(t);
  const s=t.date, e=t.endDate;
  if(ds===s && ds===e) return evTimeLabel(t);
  if(ds===s) return t.time? 'mulai '+t.time : 'mulai';
  if(ds===e) return t.end? 'selesai '+t.end : 'selesai';
  return 'sepanjang hari';
}
function whenSummary(t){ const ty=evType(t);
  if(ty==='repeat'){ const dd=(t.days&&t.days.length&&t.days.length<7)? t.days.slice().sort((a,b)=>a-b).map(d=>DOW[d]).join(' '):'tiap hari';
    return rangeLabel(t)+' · '+dd+(t.time?` · ${evTimeLabel(t)}`:''); }
  if(ty==='multi'){ return (t.dates?t.dates.length:0)+' hari pilihan'+(t.time?` · ${evTimeLabel(t)}`:''); }
  if(isContinuous(t)){ const s=parseISO(t.date), e=parseISO(t.endDate);
    const sd=`${s.getDate()} ${MONTH[s.getMonth()].slice(0,3)}${t.time?' '+t.time:''}`;
    const ed=`${e.getDate()} ${MONTH[e.getMonth()].slice(0,3)}${validEnd(t)?' '+validEnd(t):''}`;

  return evTimeLabel(t);
}
function eventsOccurringOn(ds){ return state.tasks.filter(t=>occursOn(t,ds)).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')); }
function tlEventRow(t, ds, agenda){
  const start=t.time, end=validEnd(t);
  // continuous multi-day span keeps the compact range card (mulai / sepanjang hari / selesai)

      <div class="tl-card range"><div class="tl-main"><div class="tl-title" data-edit-event="${t.id}">${esc(t.title)}${t.remind?` <span class="bell">H-${t.remind}</span>`:''}</div><div class="tl-sub">${sub}</div></div><div class="tl-del" data-task-del="${t.id}">${I.trash}</div></div></div>`;
  }
  // anything with a per-day start time (once, or multi/repeat with the same daily time) → proportional bar
  if(start){
    const durMin = end ? (toMin(end)-toMin(start)) : 0;
    const barPx = end ? Math.max(32, Math.min(300, Math.round(durMin*0.55))) : 22;

function tlHabitsRow(chips){ return `<div class="tl-row"><div class="tl-time"></div><div class="tl-rail"></div><div class="tl-habits">${chips}</div></div>`; }
function tlEmptyRow(txt){ return `<div class="tl-row"><div class="tl-time"></div><div class="tl-rail"></div><div class="tl-empty">${txt||'—'}</div></div>`; }
function dayGrid(ds){
  const evs=eventsOccurringOn(ds);
  const banners=[], timed=[], untimed=[];
  evs.forEach(t=>{ if(isContinuous(t)) banners.push(t); else if(t.time) timed.push(t); else untimed.push(t); });
  let out='';
  banners.forEach(t=>{ const {x,n}=dayIndex(t,ds);
    out+=`<div class="dg-banner" data-edit-event="${t.id}"><span class="dg-bar"></span><div class="tl-main"><div class="tl-title">${esc(t.title)}</div><div class="tl-sub">${whenSummary(t)} · Hari ${x}/${n}</div></div><div class="tl-del" data-task-del="${t.id}">${I.trash}</div></div>`; });
  if(timed.length){
    const items=timed.map(t=>({t, s:toMin(t.time), e:(validEnd(t)? toMin(validEnd(t)) : toMin(t.time)+60)})).sort((a,b)=>a.s-b.s);
    let i=0;
    while(i<items.length){ let cEnd=items[i].e, j=i+1;
      while(j<items.length && items[j].s<cEnd){ cEnd=Math.max(cEnd,items[j].e); j++; }
      const cl=items.slice(i,j), lanes=[];
      cl.forEach(it=>{ let p=false; for(let L=0;L<lanes.length;L++){ if(lanes[L]<=it.s){ lanes[L]=it.e; it.lane=L; p=true; break; } } if(!p){ it.lane=lanes.length; lanes.push(it.e); } });
      cl.forEach(it=>it.lanesTotal=lanes.length); i=j;
    }
    const isToday=ds===todayISO(); const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
    let minS=Math.min(...items.map(x=>x.s)), maxE=Math.max(...items.map(x=>x.e));
    if(isToday){ minS=Math.min(minS,nowMin); maxE=Math.max(maxE,nowMin+30); }
    let gStart=Math.max(0,Math.floor(minS/60)), gEnd=Math.min(24,Math.ceil(maxE/60));
    if(gEnd-gStart<3) gEnd=Math.min(24,gStart+3);
    const HH=58, total=(gEnd-gStart)*HH;
    let lines='';
    for(let h=gStart;h<=gEnd;h++){ const top=(h-gStart)*HH; lines+=`<div class="dg-line" style="top:${top}px"></div><div class="dg-hlabel" style="top:${top-6}px">${String(h).padStart(2,'0')}:00</div>`; }
    let blocks='';
    items.forEach(it=>{ const top=(it.s-gStart*60)/60*HH, hgt=Math.max(36,(it.e-it.s)/60*HH), w=100/(it.lanesTotal||1), left=(it.lane||0)*w;
      blocks+=`<div class="dg-ev" data-edit-event="${it.t.id}" style="top:${top}px;height:${hgt-4}px;left:calc(${left}% + 2px);width:calc(${w}% - 4px)">
        <div class="dg-ev-t">${esc(it.t.title)}</div><div class="dg-ev-time">${it.t.time}${validEnd(it.t)?'–'+validEnd(it.t):''}</div>
        <div class="dg-del" data-task-del="${it.t.id}">${I.trash}</div></div>`; });
    let nowEl='';
    if(isToday && nowMin>=gStart*60 && nowMin<=gEnd*60){ const top=(nowMin-gStart*60)/60*HH; nowEl=`<div class="dg-now" style="top:${top}px"><span class="dg-now-dot"></span><span class="dg-now-line"></span></div>`; }
    out+=`<div class="daygrid" style="height:${total}px">${lines}<div class="dg-content">${blocks}${nowEl}</div></div>`;
  }
  if(untimed.length){ out+=`<div class="dg-untimed">${untimed.map(t=>`<div class="dg-chip" data-edit-event="${t.id}">${esc(t.title)}<span class="dg-x" data-task-del="${t.id}">✕</span></div>`).join('')}</div>`; }
  return out;
}
function evRow(t,ds,agenda){
  if(isRange(t)){
    const {x,n}=dayIndex(t,ds);
    const sub = agenda? whenSummary(t) : dayTimeLabel(t,ds);
    return `<div class="task span"><div class="sbar"></div>
      <div class="ttitle" data-edit-event="${t.id}">${esc(t.title)}${sub?`<div class="tsub">${sub}</div>`:''}</div>

function prepAlerts(){
  const ti=todayISO(); const out=[];
  state.tasks.forEach(t=>{ if(t.done) return; const r=t.remind||0; if(r<=0) return;
    const du=daysBetween(ti,startDay(t)); if(du>=1 && du<=r) out.push({t,du}); });
  return out.sort((a,b)=>a.du-b.du || (a.t.time||'').localeCompare(b.t.time||''));
}
function tasksOn(ds){ return state.tasks.filter(t=>t.date===ds).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')); }
function upcomingEvents(days){
  const ti=todayISO(); const out=state.tasks.filter(t=>{ const du=daysBetween(ti,t.date); return du>=0 && du<=days; });
  return out.sort((a,b)=> a.date.localeCompare(b.date) || (a.time||'99:99').localeCompare(b.time||'99:99'));
}

/* resolution */
function resProgress(r){
  const linked=state.habits.filter(h=>r.habitIds.includes(h.id));
  if(!linked.length) return {perfect:0,streak:0};
  let perfect=0,streak=0; const ti=todayISO();
  let d=parseISO(r.createdAt), today=new Date();
  const perfectDay=ds=>{ const due=linked.filter(h=>dueScheduled(h,ds) && !isSkipped(h.id,ds)); if(!due.length) return null; return due.every(h=>isDone(h.id,ds)); };
  while(d<=today){ const ds=iso(d); const p=perfectDay(ds); if(p===true) perfect++; d=addDays(d,1); }
  d=new Date();
  for(let i=0;i<500;i++){ const ds=iso(d); const p=perfectDay(ds);
    if(p===true) streak++; else if(p===false && i!==0) break; else if(p===false && i===0) break; d=addDays(d,-1); }
  return {perfect,streak};
}

function calMonth(){
  const ti=todayISO();
  const first=new Date(calY,calM,1);
  const lead=(first.getDay()+6)%7;
  const days=new Date(calY,calM+1,0).getDate();
  let cells='';
  for(let i=0;i<lead;i++) cells+=`<div class="cal-cell blank"></div>`;
  for(let d=1;d<=days;d++){
    const ds=iso(new Date(calY,calM,d));
    const sched=state.habits.filter(h=>dueScheduled(h,ds));
    const hasEv=state.tasks.some(t=>occursOn(t,ds));
    const isToday=ds===ti, past=ds<ti;
    let alldone=false;
    if(sched.length){ const act=sched.filter(h=>!isSkipped(h.id,ds)); alldone=act.length>0 && act.every(h=>isDone(h.id,ds)); }
    let dots=''; if(sched.length) dots+=`<span class="dot h"></span>`; if(hasEv) dots+=`<span class="dot t"></span>`;
    cells+=`<div class="cal-cell ${isToday?'today':''} ${alldone?'alldone':''} ${past&&!alldone?'outpast':''}" data-open-day="${ds}">
      <span class="dn">${d}</span><span class="dots">${dots}</span></div>`;
  }
  return `<div class="cal"><div class="cal-head"><div class="mname">${MONTH[calM]} ${calY}</div>

      <span><span class="cell" style="width:12px;height:12px;background:rgba(88,208,166,.4)"></span>tuntas</span></div>`;
}
function calWeek(){
  const ti=todayISO();
  const ws=weekRefISO?parseISO(weekRefISO):weekStart(new Date());
  const end=addDays(ws,6);
  const rng=`${ws.getDate()} ${MONTH[ws.getMonth()].slice(0,3)} – ${end.getDate()} ${MONTH[end.getMonth()].slice(0,3)}`;
  let rows='';
  for(let i=0;i<7;i++){
    const dd=addDays(ws,i), ds=iso(dd), isT=ds===ti;
    const sched=state.habits.filter(h=>dueScheduled(h,ds) && !isSkipped(h.id,ds));
    const tks=eventsOccurringOn(ds);
    rows+=tlDayRow(DOWFULL[dd.getDay()], `${dd.getDate()} ${MONTH[dd.getMonth()].slice(0,3)}`, isT);
    tks.forEach(t=>{ rows+=tlEventRow(t,ds); });
    if(sched.length) rows+=tlHabitsRow(sched.map(h=>`<span class="hchip ${isDone(h.id,ds)?'done':''}">${h.icon} ${esc(h.name)}</span>`).join(''));
    if(!tks.length && !sched.length) rows+=tlEmptyRow('Kosong');
  }
  return `<div class="cal"><div class="cal-head"><div class="mname">${rng}</div>
    <div class="cal-nav"><button data-wk="-1">${I.arL}</button><button data-wk="0" title="Minggu ini">•</button><button data-wk="1">${I.arR}</button></div></div></div>
    <div class="tl">${rows}</div>`;
}
function calAgenda(){

  }
  const rel=state.tasks.filter(t=>(t.endDate||t.date)>=ti).sort((a,b)=> a.date.localeCompare(b.date) || (a.time||'99:99').localeCompare(b.time||'99:99'));
  const ongoing=rel.filter(t=>t.date<ti);

  if(!future.length && !ongoing.length){ html+=`<div class="empty"><div class="em">🗓️</div><h3>Belum ada acara</h3><p>Tambahkan acara dengan tombol di bawah. Acara bisa berlangsung beberapa hari, dan kamu bisa mengatur pengingat agar sempat bersiap.</p></div>`; return html; }

  let rows='';

  let lastDate='';
  future.forEach(t=>{ if(t.date!==lastDate){ const d=parseISO(t.date); const du=daysBetween(ti,t.date);
      rows+=tlDayRow(`${DOWFULL[d.getDay()]}, ${d.getDate()} ${MONTH[d.getMonth()].slice(0,3)}`, du===0?'hari ini':du===1?'besok':'dalam '+du+' hari', du===0); lastDate=t.date; }

  html+=`<div class="tl">${rows}</div>`;
  return html;
}

      <span class="chev">${I.chev}</span></div>`; });
  html+=`<div class="addbar"><button class="btn btn-primary" data-add-habit>+ Tambah kebiasaan</button></div>`;

}

function heatGrid(){
  const cells=105, today=new Date(); let start=addDays(today,-(cells-1)); start=weekStart(start);
  let cols='',wk='',n=0,cur=new Date(start), ti=todayISO();
  while(cur<=today){ const ds=iso(cur);
    const sched=state.habits.filter(h=>dueScheduled(h,ds));
    const expected=sched.filter(h=>!isSkipped(h.id,ds));
    const flexDone=state.habits.filter(h=>h.schedule.type==='flexible'&&isDone(h.id,ds)).length;
    const num=expected.filter(h=>isDone(h.id,ds)).length+flexDone;
    const den=expected.length+flexDone;
    const onlySkip=sched.length>0 && expected.length===0 && flexDone===0;
    let cls='cell', bg='#241F36';
    if(onlySkip){ cls='cell skip'; }
    else if(den>0){ const r=num/den; bg = r===0?'#2A2440' : r<.34?'rgba(255,159,69,.30)' : r<.67?'rgba(255,159,69,.6)' : r<1?'rgba(255,159,69,.85)' : 'var(--mint)'; }
    wk+=`<div class="${cls}" style="${cls==='cell skip'?'':'background:'+bg}" title="${ds}: ${num}/${den}"></div>`;
    if(++n%7===0){ cols+=`<div class="week">${wk}</div>`; wk=''; } cur=addDays(cur,1); }
  if(wk) cols+=`<div class="week">${wk}</div>`;
  return cols;
}
function viewProgress(){
  const h=state.habits;
  let totalDone=0; Object.values(state.completions).forEach(a=>totalDone+=a.length);
  const best=h.reduce((m,x)=>Math.max(m,longestStreak(x)),0);
  const active=h.reduce((m,x)=>Math.max(m,currentStreak(x)),0);
  let due=0,done=0,d=addDays(new Date(),-1);
  for(let i=0;i<30;i++){ const ds=iso(d); h.forEach(x=>{ if(dueScheduled(x,ds)&&!isSkipped(x.id,ds)){due++; if(isDone(x.id,ds))done++;} }); d=addDays(d,-1); }
  const orate=due?Math.round(done/due*100):0;
  let html=`<header><div class="eyebrow">Perjalanan</div><div class="hello">Progres</div><div class="subdate">Konsistensimu dari waktu ke waktu</div></header>
    <div class="stats">
      <div class="stat"><div class="big amber">${active}</div><div class="lbl">Rentetan berjalan</div></div>
      <div class="stat"><div class="big mint">${best}</div><div class="lbl">Rekor terpanjang</div></div>
      <div class="stat"><div class="big">${orate}%</div><div class="lbl">Konsistensi 30 hari</div></div>
      <div class="stat"><div class="big">${totalDone}</div><div class="lbl">Total tercatat</div></div></div>`;
  if(h.length){
    html+=`<div class="gridcard"><h4>Peta konsistensi</h4><p class="desc">15 minggu terakhir. Makin terang, makin banyak yang tuntas. Garis miring = hari yang kamu lewati.</p>
      <div class="heat">${heatGrid()}</div>
      <div class="legend">kurang<div class="cell" style="background:#2A2440"></div><div class="cell" style="background:rgba(255,159,69,.3)"></div><div class="cell" style="background:rgba(255,159,69,.6)"></div><div class="cell" style="background:rgba(255,159,69,.85)"></div><div class="cell" style="background:var(--mint)"></div>penuh</div></div>`;
    html+=`<div class="sec-h"><h2>Per kebiasaan</h2></div>`;
    h.forEach(x=>{ const r=rate(x),st=currentStreak(x),unit=x.schedule.type==='flexible'?'mgg':'hari';
      html+=`<div class="card" style="display:block"><div style="display:flex;align-items:center;gap:13px">
        <div class="icon">${x.icon}</div><div class="c-body"><div class="name">${esc(x.name)}</div>
        <div class="sub">${st>0?`<span class="flame">${I.flame}${st} ${unit}</span>`:'<span class="pill">belum ada rentetan</span>'}<span class="pill">${r===null?'baru':r+'% terjaga'}</span></div></div></div>
        <div class="pbar"><i style="width:${r===null?0:r}%"></i></div></div>`; });
  } else html+=`<div class="empty"><div class="em">📈</div><h3>Progres muncul di sini</h3><p>Setelah ada kebiasaan dan beberapa centang, kamu akan melihat rentetan dan peta konsistensi.</p></div>`;
  html+=`<div class="gridcard" style="margin-top:18px"><h4>Data & cadangan</h4>
    <p class="desc">Datamu tersimpan di perangkat ini dan tidak dikirim ke mana pun. Ekspor untuk membuat cadangan, atau impor untuk memulihkan di perangkat lain.</p>
    <div class="addbar" style="margin:0"><button class="btn btn-ghost" data-export>Ekspor data</button><button class="btn btn-ghost" data-import>Impor data</button></div></div>`;
  return html;
}

function viewRes(){

    cells+=`<button class="mc-cell ${sel?'sel':''} ${ds===ti?'today':''}" data-mcd="${ds}">${d}</button>`; }

  if(e.target.closest('[data-add-res]')){ if(state.habits.length) resSheet(null); return; }
  const er=e.target.closest('[data-edit-res]'); if(er){ resSheet(state.resolutions.find(x=>x.id===er.dataset.editRes)); return; }
  if(e.target.closest('[data-export]')){ exportData(); return; }
  if(e.target.closest('[data-import]')){ document.getElementById('importer').click(); return; }
});

sheet.addEventListener('click', async (e)=>{
  // habit sheet
  const em=e.target.closest('[data-e]'); if(em){ draft.icon=em.dataset.e; sheet.querySelectorAll('.emoji-opt').forEach(x=>x.classList.toggle('sel',x.dataset.e===draft.icon)); return; }
  const sg=e.target.closest('#f-seg [data-t]'); if(sg){ const t=sg.dataset.t; draft.schedule={type:t}; sheet.querySelectorAll('#f-seg .seg').forEach(x=>x.classList.toggle('sel',x.dataset.t===t));
    sheet.querySelector('#f-dows').style.display=t==='weekly'?'block':'none'; sheet.querySelector('#f-flex').style.display=t==='flexible'?'block':'none'; return; }
  const dw=e.target.closest('[data-d]'); if(dw){ const i=+dw.dataset.d;
    if(dw.closest('#e-days')){ const k=draft._days.indexOf(i); if(k>=0)draft._days.splice(k,1); else draft._days.push(i); dw.classList.toggle('sel'); return; }
    const k=draft._days.indexOf(i); if(k>=0)draft._days.splice(k,1); else draft._days.push(i); dw.classList.toggle('sel'); return; }
  const stp=e.target.closest('[data-step]'); if(stp){ draft._tpw=Math.max(1,Math.min(7,draft._tpw+ +stp.dataset.step)); sheet.querySelector('#f-tpw').textContent=draft._tpw; return; }
  if(e.target.id==='f-save'){ const name=sheet.querySelector('#f-name').value.trim(); if(!name){ const f=sheet.querySelector('#f-name'); f.focus(); f.style.borderColor='var(--rose)'; return; }
    let sch=draft.schedule; if(sch.type==='weekly'){ if(!draft._days.length){ sch={type:'daily'}; } else sch={type:'weekly',days:draft._days.slice()}; } else if(sch.type==='flexible'){ sch={type:'flexible',timesPerWeek:draft._tpw}; } else sch={type:'daily'};
    if(editingHabit){ const h=state.habits.find(x=>x.id===editingHabit); h.name=name; h.icon=draft.icon; h.schedule=sch; }
    else state.habits.push({id:'h'+Date.now(),name,icon:draft.icon,schedule:sch,createdAt:todayISO()});
    await save(); closeSheet(); return; }
  if(e.target.id==='f-del'){ state.habits=state.habits.filter(x=>x.id!==editingHabit); state.resolutions.forEach(r=>r.habitIds=r.habitIds.filter(i=>i!==editingHabit)); await save(); closeSheet(); return; }
  // resolution sheet
  const rt=e.target.closest('#r-target [data-t]'); if(rt){ draft.target=+rt.dataset.t; sheet.querySelectorAll('#r-target .target').forEach(x=>x.classList.toggle('sel',+x.dataset.t===draft.target)); return; }
  const rh=e.target.closest('[data-h]'); if(rh){ const id=rh.dataset.h; const k=draft.habitIds.indexOf(id); if(k>=0)draft.habitIds.splice(k,1); else draft.habitIds.push(id); rh.classList.toggle('sel'); return; }
  if(e.target.id==='r-save'){ const title=sheet.querySelector('#r-title').value.trim(); if(!title){ const f=sheet.querySelector('#r-title'); f.focus(); f.style.borderColor='var(--rose)'; return; }
    if(editingRes){ const r=state.resolutions.find(x=>x.id===editingRes); r.title=title; r.target=draft.target; r.habitIds=draft.habitIds; }
    else state.resolutions.push({id:'r'+Date.now(),title,target:draft.target,habitIds:draft.habitIds,createdAt:todayISO()});
    await save(); closeSheet(); return; }
  if(e.target.id==='r-del'){ state.resolutions=state.resolutions.filter(x=>x.id!==editingRes); await save(); closeSheet(); return; }
  // event sheet
  const mcd=e.target.closest('[data-mcd]'); if(mcd){ const ds=mcd.dataset.mcd; const k=draft._dates.indexOf(ds); if(k>=0)draft._dates.splice(k,1); else draft._dates.push(ds); sheet.querySelector('#e-mc').innerHTML=miniCal(); return; }
  const mcn=e.target.closest('[data-mcnav]'); if(mcn){ draft._mM+=(+mcn.dataset.mcnav); if(draft._mM<0){draft._mM=11;draft._mY--;} if(draft._mM>11){draft._mM=0;draft._mY++;} sheet.querySelector('#e-mc').innerHTML=miniCal(); return; }
  const est=e.target.closest('#e-seg [data-etype]'); if(est){ const t=est.dataset.etype; draft.etype=t;
    sheet.querySelectorAll('#e-seg .seg').forEach(x=>x.classList.toggle('sel',x.dataset.etype===t));
    sheet.querySelector('#e-oncewrap').style.display=(t==='multi')?'none':'block';
    sheet.querySelector('#e-endwrap').style.display=(t==='span')?'block':'none';
    sheet.querySelector('#e-multiwrap').style.display=(t==='multi')?'block':'none';
    sheet.querySelector('#e-datelabel').textContent = t==='once'?'Tanggal':'Tanggal mulai';
    sheet.querySelector('#e-timelabel').textContent = t==='span'?'Jam mulai (hari pertama) – selesai (hari terakhir)' : t==='multi'?'Jam (sama untuk semua tanggal)' : 'Waktu (opsional)';
    sheet.querySelector('#e-hint').textContent = typeHint(t); return; }
  const erm=e.target.closest('#e-remind [data-remind]'); if(erm){ draft.remind=+erm.dataset.remind; sheet.querySelectorAll('#e-remind .target').forEach(x=>x.classList.toggle('sel',+x.dataset.remind===draft.remind)); return; }
  if(e.target.id==='e-save'){ const title=sheet.querySelector('#e-title').value.trim();
    if(!title){ const f=sheet.querySelector('#e-title'); f.focus(); f.style.borderColor='var(--rose)'; return; }
    const et=draft.etype||'once';
    let time=sheet.querySelector('#e-time').value||null, end=sheet.querySelector('#e-end').value||null;
    const note=sheet.querySelector('#e-note').value.trim();
    if(et!=='span' && time && end && end<=time){ end=null; toast('Jam selesai harus setelah jam mulai — diabaikan'); }
    let obj;
    if(et==='multi'){ if(!draft._dates.length){ toast('Pilih minimal satu tanggal'); return; }
      const ds=draft._dates.slice().sort(); obj={title,type:'multi',dates:ds,date:ds[0],time,end,note,remind:draft.remind}; }
    else { const date=sheet.querySelector('#e-date').value; if(!date){ sheet.querySelector('#e-date').style.borderColor='var(--rose)'; return; }
      if(et==='span'){ const er2=sheet.querySelector('#e-enddate').value; if(!er2||er2<date){ sheet.querySelector('#e-enddate').style.borderColor='var(--rose)'; toast('Isi tanggal selesai (≥ tanggal mulai)'); return; }
        obj={title,type:(er2===date?'once':'span'),date,endDate:(er2===date?null:er2),time,end,note,remind:draft.remind}; }
      else obj={title,type:'once',date,endDate:null,time,end,note,remind:draft.remind};
    }
    if(editingEvent){ const t=state.tasks.find(x=>x.id===editingEvent); for(const k in t){ if(!(k in obj)&&k!=='id'&&k!=='done') delete t[k]; } Object.assign(t,obj); }
    else state.tasks.push(Object.assign({id:'t'+Date.now(),done:false},obj));
    await save(); closeSheet(); return; }
  if(e.target.id==='e-del'){ state.tasks=state.tasks.filter(x=>x.id!==editingEvent); await save(); closeSheet(); return; }
  // day sheet
  const dt=e.target.closest('[data-day-toggle]'); if(dt){ toggleDone(dt.dataset.dayToggle, dt.dataset.date); await save(); refreshDay(); return; }
  const dsk=e.target.closest('[data-day-skip]'); if(dsk){ toggleSkip(dsk.dataset.daySkip, dsk.dataset.date); await save(); refreshDay(); return; }
  const dtt=e.target.closest('[data-task-toggle]'); if(dtt && sheetMode==='day'){ const t=state.tasks.find(x=>x.id===dtt.dataset.taskToggle); if(t){t.done=!t.done; await save(); refreshDay();} return; }
  const ddl=e.target.closest('[data-task-del]'); if(ddl && sheetMode==='day'){ state.tasks=state.tasks.filter(x=>x.id!==ddl.dataset.taskDel); await save(); refreshDay(); return; }
  const at=e.target.closest('[data-add-task]'); if(at){ const ti=sheet.querySelector('#t-title'), tm=sheet.querySelector('#t-time'), te=sheet.querySelector('#t-end'); const title=ti.value.trim(); if(!title){ ti.focus(); ti.style.borderColor='var(--rose)'; return; }
    state.tasks.push({id:'t'+Date.now(),title,date:at.dataset.date,time:tm.value||null,end:te.value||null,done:false}); await save(); refreshDay(); return; }
});

/* boot */
(async function(){ const s=await load(); if(s&&s.habits){ state=s; state.skips=state.skips||{}; state.tasks=state.tasks||[]; state.resolutions=state.resolutions||[]; }
  const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); render(); })();

/* import file input */
document.getElementById('importer').addEventListener('change', function(){ if(this.files&&this.files[0]) importData(this.files[0]); this.value=''; });

/* install as an app + offline; auto-update when a new version is deployed */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{ if(refreshing) return; refreshing=true; location.reload(); });
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').then((reg)=>{ reg.update(); }).catch(()=>{}); });
}
</script>
